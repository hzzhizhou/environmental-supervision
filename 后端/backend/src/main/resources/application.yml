server:
  port: 8080

spring:
  application:
    name: environmental-supervision
  
  sql:
    init:
      encoding: UTF-8
  
  datasource:
    url: jdbc:mysql://localhost:3306/epm_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true&createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci; SET CHARACTER_SET_CLIENT=utf8mb4; SET CHARACTER_SET_RESULTS=utf8mb4; SET CHARACTER_SET_CONNECTION=utf8mb4;

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      table-underline: true
  type-aliases-package: com.neusoft.env.entity
  mapper-locations: classpath*:mapper/**/*.xml

logging:
  level:
    com.neusoft.env: DEBUG
    com.baomidou.mybatisplus: DEBUG

jwt:
  secret: neusoft-environmental-supervision-secret-key-2026
  expiration: 86400000

file:
  upload:
    path: ${user.dir}/uploads/ # 文件上传根目录，子目录包括avatar(头像)、report(现场图片)等